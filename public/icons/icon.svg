<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5C5B8"/>
      <stop offset="100%" style="stop-color:#C88B9A"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g transform="translate(256,240)">
    <!-- Heart shape -->
    <path d="M0,40
      C0,40 -90,-40 -90,-80
      C-90,-120 -50,-140 -20,-130
      C0,-124 0,-100 0,-100
      C0,-100 0,-124 20,-130
      C50,-140 90,-120 90,-80
      C90,-40 0,40 0,40Z"
      fill="white" opacity="0.9"/>
    <!-- Small sparkle -->
    <circle cx="-60" cy="-100" r="6" fill="white" opacity="0.6"/>
    <circle cx="50" cy="-60" r="4" fill="white" opacity="0.5"/>
  </g>
  <!-- Leaf/sprout on top -->
  <g transform="translate(256,130)">
    <path d="M0,0 C-10,-30 -30,-40 -20,-50 C-10,-60 10,-40 0,0Z" fill="white" opacity="0.7"/>
    <path d="M0,0 C10,-25 25,-35 20,-45 C15,-55 -5,-35 0,0Z" fill="white" opacity="0.5"/>
  </g>
</svg>
